app = "budgetwise-app" # You can change this when you run fly launch
primary_region = "sin" # Or whatever region you prefer

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "budgetwise_data"
  destination = "/app/data"
